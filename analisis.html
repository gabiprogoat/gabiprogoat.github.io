<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>V-GO Análisis</title>

<style>
body{margin:0;font-family:system-ui;background:#f1f3f6;}
header{background:#111827;color:#fff;padding:14px;text-align:center;font-weight:700;}
.container{padding:12px;display:grid;gap:14px;}
.card{background:#fff;border-radius:16px;padding:14px;box-shadow:0 4px 14px rgba(0,0,0,.08);}

.word-item{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #eee;}
.word-actions button{margin-left:6px;border:none;border-radius:6px;padding:4px 6px;cursor:pointer;}
.btn-remove{background:#fee2e2;}
.btn-merge{background:#dbeafe;}

select,button{padding:6px;border-radius:6px;border:1px solid #ccc;}
.category-count{font-size:.8rem;color:#2563eb;}
</style>
</head>

<body>

<header>V-GO papuuuu</header>

<div class="container">

<div class="card">
<h2>Clasificación manual</h2>

<select id="wordSelect"></select>
<select id="categorySelect"></select>
<button onclick="assignCategory()">Asignar</button>

<div id="categoryCounts" class="category-count"></div>
</div>

<div class="card">
<h2>Palabras pendientes (venueCusine)</h2>
<div id="cuisine-results"></div>
</div>

</div>

<script>
const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT8ONDwd70dk_MAYCAtVr2LC6PllKUt4A_4W0ClsbyCh01GvxVeLleM1hQyL8L0fGA2ARTUMxw_alBn/pub?output=csv";

const CATEGORIES = [
"Hamburguesas y Sandwiches","Pizzas y Empanadas","Sushi",
"Comidas al Plato","Pastas","Sano","Cafetería y dulce",
"Postres","Helado","Almacén","Bebidas"
];

let removedWords = JSON.parse(localStorage.getItem("removedWords")||"[]");
let mergedWords = JSON.parse(localStorage.getItem("mergedWords")||"{}");
let categorizedWords = JSON.parse(localStorage.getItem("categorizedWords")||"{}");

function save(){
  localStorage.setItem("removedWords",JSON.stringify(removedWords));
  localStorage.setItem("mergedWords",JSON.stringify(mergedWords));
  localStorage.setItem("categorizedWords",JSON.stringify(categorizedWords));
}

function normalizeHeader(s){
  return s.toLowerCase().replace(/\s+/g,"").replace(/[_-]/g,"");
}

function findColumn(headers){
  const norm=headers.map(normalizeHeader);
  return norm.indexOf("venuecusine");
}

function parseCSV(text){
  const lines=text.split(/\r?\n/).filter(l=>l.trim());
  const headers=lines[0].split(",");
  const rows=lines.slice(1).map(l=>l.split(","));
  return {headers,rows};
}

let globalCounts={};

fetch(SHEET_URL)
.then(r=>r.text())
.then(csv=>{
  const {headers,rows}=parseCSV(csv);
  const index=findColumn(headers);

  let counts={};

  rows.forEach(r=>{
    let text=(r[index]||"").toLowerCase();

    text.split(/[\s,;|/]+/).forEach(w=>{
      w=w.trim();
      if(!w) return;

      if(mergedWords[w]) w=mergedWords[w];
      if(removedWords.includes(w)) return;

      counts[w]=(counts[w]||0)+1;
    });
  });

  globalCounts=counts;
  render();
  loadSelectors();
  updateCategoryCounts();
});

function render(){
  const c=document.getElementById("cuisine-results");
  c.innerHTML="";

  Object.entries(globalCounts)
    .filter(([w]) => !categorizedWords[w]) // 🔥 SOLO NO CLASIFICADAS
    .sort((a,b)=>b[1]-a[1])
    .slice(0,20)
    .forEach(([w,count])=>{
      const div=document.createElement("div");
      div.className="word-item";

      div.innerHTML=`
        <span><strong>${w}</strong>: ${count}</span>
        <div class="word-actions">
          <button class="btn-remove">❌</button>
          <button class="btn-merge">🔗</button>
        </div>
      `;

      div.querySelector(".btn-remove").onclick=()=>{
        removedWords.push(w);
        save();
        location.reload();
      };

      div.querySelector(".btn-merge").onclick=()=>{
        const t=prompt("Unificar con:");
        if(!t) return;
        mergedWords[w]=t.toLowerCase();
        save();
        location.reload();
      };

      c.appendChild(div);
    });
}

function loadSelectors(){
  const wSel=document.getElementById("wordSelect");
  const cSel=document.getElementById("categorySelect");

  wSel.innerHTML="";
  Object.keys(globalCounts)
    .filter(w => !categorizedWords[w]) // 🔥 SOLO NO CLASIFICADAS
    .forEach(w=>{
      wSel.add(new Option(w,w));
    });

  cSel.innerHTML="";
  CATEGORIES.forEach(c=>{
    cSel.add(new Option(c,c));
  });
}

function assignCategory(){
  const word=document.getElementById("wordSelect").value;
  const cat=document.getElementById("categorySelect").value;

  categorizedWords[word]=cat;
  save();

  render();
  loadSelectors();
  updateCategoryCounts();
}

function updateCategoryCounts(){
  let counts={};

  Object.entries(globalCounts).forEach(([w,c])=>{
    const cat = categorizedWords[w] || "Sin categoría";
    counts[cat]=(counts[cat]||0)+c;
  });

  const el=document.getElementById("categoryCounts");
  el.innerHTML = Object.entries(counts)
    .map(([c,v])=>`${c}: ${v}`)
    .join(" | ");
}
</script>

</body>
</html>
