<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>V-GO Análisis de Envíos</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #f1f3f6;
      color: #111827;
    }

    header {
      padding: 14px;
      background: #111827;
      color: white;
      text-align: center;
      font-size: 1.1rem;
      font-weight: 700;
    }

    .nav-link {
      display: inline-block;
      margin: 12px;
      color: #2563eb;
      text-decoration: none;
      font-weight: 600;
    }

    .container {
      padding: 12px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 4px 14px rgba(0,0,0,.08);
    }

    .card h2 {
      margin: 0 0 12px 0;
      font-size: 1.1rem;
    }

    .kpi {
      font-size: clamp(1.8rem, 6vw, 2.4rem);
      font-weight: 700;
      text-align: center;
      margin-bottom: 8px;
    }

    .subtext {
      text-align: center;
      color: #6b7280;
      font-size: 0.95rem;
    }

    .table-wrap {
      overflow-x: auto;
      margin-top: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 480px;
    }

    th, td {
      padding: 10px 8px;
      border-bottom: 1px solid #e5e7eb;
      text-align: left;
      font-size: 0.95rem;
    }

    th {
      background: #f9fafb;
      font-weight: 700;
    }

    .status {
      padding: 8px 10px;
      border-radius: 10px;
      font-weight: 600;
      display: inline-block;
    }

    .ok {
      background: #dcfce7;
      color: #166534;
    }

    .warn {
      background: #fef3c7;
      color: #92400e;
    }

    .error {
      background: #fee2e2;
      color: #991b1b;
    }

    .small {
      font-size: 0.9rem;
      color: #6b7280;
    }

    @media (min-width: 900px) {
      .container {
        grid-template-columns: repeat(2, 1fr);
      }

      .full-width {
        grid-column: 1 / -1;
      }
    }
  </style>
</head>
<body>

  <header>V-GO papuuuu</header>
  <a class="nav-link" href="analisis.html">Volver a análisis</a>

  <div class="container" id="dashboard-container">
    <div class="card">
      <h2>Envío promedio</h2>
      <div class="kpi" id="avg-shipping">Cargando...</div>
      <div class="subtext">Promedio de tarifa de servicio + envio</div>
    </div>

    <div class="card">
      <h2>Índice de tolerancia promedio</h2>
      <div class="kpi" id="avg-tolerance">Cargando...</div>
      <div class="subtext">Promedio de (Envío / Productos)</div>
    </div>

    <div class="card full-width">
      <h2>Envío ideal por mes</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Mes (month)</th>
              <th>Registros</th>
              <th>Promedio total</th>
              <th>Envío ideal</th>
            </tr>
          </thead>
          <tbody id="month-results">
            <tr>
              <td colspan="4">Cargando datos...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <div class="card full-width">
      <h2>Resumen técnico</h2>
      <div id="summary" class="small">Procesando...</div>
    </div>
  </div>

  <script>
    const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRXNYuyidgf_vcIvVrdj-lk2hbQLt-fBJMEPwXqa-KQCJkqY43d3Zr2U5co_XVpognNxUcgAPwd1c57/pub?output=csv";

    function parseCSV(text) {
      const delimiter = text.includes("\t") ? "\t" : ",";
      const lines = text.split(/\r?\n/).filter(line => line.trim() !== "");

      if (!lines.length) return { headers: [], rows: [] };

      const headers = splitCSVLine(lines[0], delimiter).map(h => cleanCell(h));
      const rows = lines.slice(1).map(line => splitCSVLine(line, delimiter).map(c => cleanCell(c)));

      return { headers, rows };
    }

    function splitCSVLine(line, delimiter) {
      const result = [];
      let current = "";
      let inQuotes = false;

      for (let i = 0; i < line.length; i++) {
        const char = line[i];
        const next = line[i + 1];

        if (char === '"') {
          if (inQuotes && next === '"') {
            current += '"';
            i++;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (char === delimiter && !inQuotes) {
          result.push(current);
          current = "";
        } else {
          current += char;
        }
      }

      result.push(current);
      return result;
    }

    function cleanCell(value) {
      return String(value || "")
        .replace(/^"|"$/g, "")
        .trim();
    }

    function normalizeHeader(str) {
      return String(str || "")
        .toLowerCase()
        .replace(/\s+/g, "")
        .replace(/[_-]/g, "");
    }

    function findColumnIndex(headers, possibleNames) {
      const normalizedHeaders = headers.map(normalizeHeader);

      for (const name of possibleNames) {
        const normalizedName = normalizeHeader(name);
        const exactIndex = normalizedHeaders.indexOf(normalizedName);
        if (exactIndex !== -1) return exactIndex;
      }

      for (let i = 0; i < normalizedHeaders.length; i++) {
        for (const name of possibleNames) {
          const normalizedName = normalizeHeader(name);
          if (normalizedHeaders[i].includes(normalizedName) || normalizedName.includes(normalizedHeaders[i])) {
            return i;
          }
        }
      }

      return -1;
    }

    function parseNumber(value) {
      if (value === null || value === undefined) return 0;

      let str = String(value).trim();

      if (!str) return 0;

      // Elimina símbolos comunes
      str = str.replace(/\$/g, "").replace(/\s/g, "");

      // Si tiene coma decimal estilo LATAM
      const hasComma = str.includes(",");
      const hasDot = str.includes(".");

      if (hasComma && hasDot) {
        // Asume formato tipo 1.234,56
        if (str.lastIndexOf(",") > str.lastIndexOf(".")) {
          str = str.replace(/\./g, "").replace(",", ".");
        } else {
          // formato 1,234.56
          str = str.replace(/,/g, "");
        }
      } else if (hasComma && !hasDot) {
        // Asume coma decimal
        str = str.replace(",", ".");
      }

      const num = parseFloat(str);
      return isNaN(num) ? 0 : num;
    }

    function formatCurrency(value) {
      return new Intl.NumberFormat("es-AR", {
        style: "currency",
        currency: "ARS",
        maximumFractionDigits: 2
      }).format(value);
    }

    function formatPercent(value) {
      return (value * 100).toFixed(2) + "%";
    }

    fetch(SHEET_URL)
      .then(response => response.text())
      .then(csv => {
        const { headers, rows } = parseCSV(csv);

        if (!headers.length || !rows.length) {
          throw new Error("No se encontraron datos en el archivo.");
        }

        const serviceTaxIndex = findColumnIndex(headers, ["serviceTax", "service tax"]);
        const deliveryChargeIndex = findColumnIndex(headers, ["deliveryCharge", "delivery charge"]);
        const totalIndex = findColumnIndex(headers, ["total"]);
        const monthIndex = findColumnIndex(headers, ["month", "mes"]);

        if ([serviceTaxIndex, deliveryChargeIndex, totalIndex, monthIndex].includes(-1)) {
          const missing = [];
          if (serviceTaxIndex === -1) missing.push("serviceTax");
          if (deliveryChargeIndex === -1) missing.push("deliveryCharge");
          if (totalIndex === -1) missing.push("total");
          if (monthIndex === -1) missing.push("month");

          throw new Error("Faltan columnas requeridas: " + missing.join(", "));
        }

        let totalShippingSum = 0;
        let toleranceSum = 0;
        let validToleranceCount = 0;
        let processedRows = 0;

        const monthGroups = {};

        rows.forEach((row) => {
          const serviceTax = parseNumber(row[serviceTaxIndex]);
          const deliveryCharge = parseNumber(row[deliveryChargeIndex]);
          const total = parseNumber(row[totalIndex]);
          const month = cleanCell(row[monthIndex]) || "Sin mes";

          const shipping = serviceTax + deliveryCharge;

          totalShippingSum += shipping;
          processedRows++;

          if (total > 0) {
            const toleranceIndex = shipping / total;
            toleranceSum += toleranceIndex;
            validToleranceCount++;
          }

          if (!monthGroups[month]) {
            monthGroups[month] = {
              count: 0,
              totalSum: 0
            };
          }

          monthGroups[month].count++;
          monthGroups[month].totalSum += total;
        });

        const avgShipping = processedRows > 0 ? totalShippingSum / processedRows : 0;
        const avgTolerance = validToleranceCount > 0 ? toleranceSum / validToleranceCount : 0;

        // Mostrar KPIs
        document.getElementById("avg-shipping").textContent = formatCurrency(avgShipping);
        document.getElementById("avg-tolerance").textContent = formatPercent(avgTolerance);

        // Mostrar tabla por mes
        const tbody = document.getElementById("month-results");
        tbody.innerHTML = "";

        const sortedMonths = Object.keys(monthGroups).sort((a, b) => {
          const numA = parseNumber(a);
          const numB = parseNumber(b);

          if (!isNaN(numA) && !isNaN(numB) && numA !== 0 && numB !== 0) {
            return numA - numB;
          }

          return String(a).localeCompare(String(b), "es");
        });

        sortedMonths.forEach((month) => {
          const group = monthGroups[month];
          const avgTotalForMonth = group.count > 0 ? group.totalSum / group.count : 0;
          const idealShipping = avgTotalForMonth * avgTolerance;

          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td>${month}</td>
            <td>${group.count}</td>
            <td>${formatCurrency(avgTotalForMonth)}</td>
            <td><strong>${formatCurrency(idealShipping)}</strong></td>
          `;
          tbody.appendChild(tr);
        });

        // Resumen técnico
        document.getElementById("summary").innerHTML = `
          <p><strong>Columnas detectadas:</strong></p>
          <ul>
            <li>serviceTax → <strong>${headers[serviceTaxIndex]}</strong></li>
            <li>deliveryCharge → <strong>${headers[deliveryChargeIndex]}</strong></li>
            <li>total → <strong>${headers[totalIndex]}</strong></li>
            <li>month → <strong>${headers[monthIndex]}</strong></li>
          </ul>
          <p><strong>Registros procesados:</strong> ${processedRows}</p>
          <p><strong>Registros válidos para índice de tolerancia:</strong> ${validToleranceCount}</p>
          <p><strong>Fórmulas usadas:</strong></p>
          <ul>
            <li>Envío = serviceTax + deliveryCharge</li>
            <li>Índice de tolerancia = Envío / total</li>
            <li>Envío ideal por mes = Promedio total del mes / (1 + Índice de tolerancia promedio)</li>
          </ul>
        `;
      })
      .catch(error => {
        console.error(error);

        document.getElementById("avg-shipping").textContent = "Error";
        document.getElementById("avg-tolerance").textContent = "Error";
        document.getElementById("month-results").innerHTML = `
          <tr>
            <td colspan="4">No se pudieron procesar los datos: ${error.message}</td>
          </tr>
        `;
        document.getElementById("summary").innerHTML = `
          <span class="status error">Error al leer la hoja</span>
          <p>${error.message}</p>
        `;
      });
  </script>

</body>
</html>
